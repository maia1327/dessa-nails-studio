<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel ADM - Andressa Santos</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="admin-page">

<section class="admin-layout">
  <div class="admin-shell">

    <div class="admin-header">
      <div>
        <span>Painel administrativo</span>
        <h1>Andressa Santos</h1>
        <p>Gerencie serviços, valores, fotos e horários do site.</p>
      </div>

      <a href="index.html" class="admin-link">Ver site</a>
    </div>

    <div id="mensagemAdmin" class="mensagem-admin"></div>

    <div class="admin-grid">

      <div class="admin-card">
        <div class="admin-card-top">
          <div>
            <span>Portfólio</span>
            <h2>Tabela de serviços</h2>
          </div>
          <button class="admin-save" onclick="salvarPortfolio()">Salvar portfólio</button>
        </div>

        <div class="admin-form">
          <label>Título</label>
          <input type="text" id="portfolioTituloAdmin" placeholder="Título">

          <label>Subtítulo</label>
          <input type="text" id="portfolioSubtituloAdmin" placeholder="Subtítulo">
        </div>

        <div class="admin-section-title">
          <h3>Aplicações</h3>
          <button onclick="adicionarServico('aplicacoes')">+ Adicionar</button>
        </div>

        <div id="listaAplicacoesAdmin"></div>

        <div class="admin-section-title">
          <h3>Manutenções</h3>
          <button onclick="adicionarServico('manutencoes')">+ Adicionar</button>
        </div>

        <div id="listaManutencoesAdmin"></div>
      </div>

      <div class="admin-card">
        <div class="admin-card-top">
          <div>
            <span>Galeria</span>
            <h2>Fotos do portfólio</h2>
          </div>
        </div>

        <p class="admin-ajuda">
          Exemplo: <strong>./fotos/foto01.png</strong>
        </p>

        <div id="listaFotosPortfolioAdmin"></div>

        <button class="admin-save full" onclick="adicionarFotoPortfolio()">+ Adicionar foto</button>
      </div>

      <div class="admin-card">
        <div class="admin-card-top">
          <div>
            <span>Agenda</span>
            <h2>Adicionar disponibilidade</h2>
          </div>
        </div>

        <div class="admin-form duas-colunas">
          <div>
            <label>Data</label>
            <input type="date" id="adminData">
          </div>

          <div>
            <label>Horário</label>
            <input type="time" id="adminHorario">
          </div>
        </div>

        <button class="admin-save full" onclick="adicionarHorario()">Adicionar horário</button>
      </div>

      <div class="admin-card">
        <div class="admin-card-top">
          <div>
            <span>Controle</span>
            <h2>Horários cadastrados</h2>
          </div>
        </div>

        <div id="listaHorarios"></div>
      </div>

    </div>
  </div>
</section>

<script>
  let disponibilidades = JSON.parse(localStorage.getItem("disponibilidades")) || [];
  let editandoIndex = null;

  const portfolioPadrao = {
    titulo: "Tabela de Serviços",
    subtitulo: "Beleza, cuidado e sofisticação em cada detalhe.",
    aplicacoes: [
      { nome: "Molde F1", preco: "R$ 120,00" },
      { nome: "Fibra de vidro", preco: "R$ 130,00" },
      { nome: "Banho de gel", preco: "R$ 90,00" },
      { nome: "Blindagem", preco: "R$ 80,00" },
      { nome: "Esmaltação em Gel", preco: "R$ 60,00" }
    ],
    manutencoes: [
      { nome: "Alongamento", preco: "R$ 90,00" },
      { nome: "Banho de gel", preco: "R$ 60,00" }
    ],
    fotos: [
      "./fotos/foto01.png",
      "./fotos/foto02.png",
      "./fotos/foto03.png"
    ]
  };

  let portfolioConfig = JSON.parse(localStorage.getItem("portfolioConfig")) || portfolioPadrao;

  disponibilidades = disponibilidades.map(item => ({
    ...item,
    status: item.status || "disponivel"
  }));

  function mostrarMensagem(texto) {
    const msg = document.getElementById("mensagemAdmin");
    msg.innerText = texto;
    msg.classList.add("ativo");

    setTimeout(() => {
      msg.classList.remove("ativo");
    }, 2600);
  }

  function salvarStoragePortfolio() {
    localStorage.setItem("portfolioConfig", JSON.stringify(portfolioConfig));
  }

  function renderizarPortfolioAdmin() {
    document.getElementById("portfolioTituloAdmin").value = portfolioConfig.titulo || "";
    document.getElementById("portfolioSubtituloAdmin").value = portfolioConfig.subtitulo || "";

    renderizarServicosAdmin("aplicacoes", "listaAplicacoesAdmin");
    renderizarServicosAdmin("manutencoes", "listaManutencoesAdmin");
    renderizarFotosPortfolioAdmin();
  }

  function renderizarServicosAdmin(tipo, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    portfolioConfig[tipo].forEach((item, index) => {
      const div = document.createElement("div");
      div.className = "admin-servico-item";

      div.innerHTML = `
        <div>
          <label>Serviço</label>
          <input id="${tipo}-nome-${index}" type="text" value="${item.nome}" disabled>
        </div>

        <div>
          <label>Valor</label>
          <input id="${tipo}-preco-${index}" type="text" value="${item.preco}" disabled>
        </div>

        <div class="admin-acoes-item">
          <button class="admin-edit" onclick="editarLinhaServico('${tipo}', ${index})">Editar</button>
          <button class="admin-save-small" onclick="salvarLinhaServico('${tipo}', ${index})">Salvar</button>
          <button class="admin-delete" onclick="excluirServico('${tipo}', ${index})">Excluir</button>
        </div>
      `;

      container.appendChild(div);
    });
  }

  function editarLinhaServico(tipo, index) {
    document.getElementById(`${tipo}-nome-${index}`).disabled = false;
    document.getElementById(`${tipo}-preco-${index}`).disabled = false;
    document.getElementById(`${tipo}-nome-${index}`).focus();
    mostrarMensagem("Agora você pode editar este serviço.");
  }

  function salvarLinhaServico(tipo, index) {
    const nome = document.getElementById(`${tipo}-nome-${index}`).value.trim();
    const preco = document.getElementById(`${tipo}-preco-${index}`).value.trim();

    if (!nome || !preco) {
      mostrarMensagem("Preencha o nome e o valor.");
      return;
    }

    portfolioConfig[tipo][index].nome = nome;
    portfolioConfig[tipo][index].preco = preco;

    salvarStoragePortfolio();
    renderizarPortfolioAdmin();
    mostrarMensagem("Serviço salvo com sucesso!");
  }

  function adicionarServico(tipo) {
    portfolioConfig[tipo].push({
      nome: "Novo serviço",
      preco: "R$ 0,00"
    });

    salvarStoragePortfolio();
    renderizarPortfolioAdmin();
    mostrarMensagem("Serviço adicionado. Clique em Editar para alterar.");
  }

  function excluirServico(tipo, index) {
    const nome = portfolioConfig[tipo][index].nome;

    if (!confirm(`Tem certeza que deseja excluir "${nome}"?`)) {
      return;
    }

    portfolioConfig[tipo].splice(index, 1);
    salvarStoragePortfolio();
    renderizarPortfolioAdmin();
    mostrarMensagem("Serviço excluído.");
  }

  function renderizarFotosPortfolioAdmin() {
    const lista = document.getElementById("listaFotosPortfolioAdmin");
    lista.innerHTML = "";

    portfolioConfig.fotos.forEach((foto, index) => {
      const div = document.createElement("div");
      div.className = "admin-foto-item";

      div.innerHTML = `
        <div class="admin-preview">
          <img src="${foto}" alt="Prévia da foto">
        </div>

        <div>
          <label>Caminho da foto</label>
          <input id="foto-${index}" type="text" value="${foto}" disabled>
        </div>

        <div class="admin-acoes-item">
          <button class="admin-edit" onclick="editarFotoLinha(${index})">Editar</button>
          <button class="admin-save-small" onclick="salvarFotoLinha(${index})">Salvar</button>
          <button class="admin-delete" onclick="excluirFotoPortfolio(${index})">Excluir</button>
        </div>
      `;

      lista.appendChild(div);
    });
  }

  function editarFotoLinha(index) {
    document.getElementById(`foto-${index}`).disabled = false;
    document.getElementById(`foto-${index}`).focus();
    mostrarMensagem("Agora você pode editar o caminho da foto.");
  }

  function salvarFotoLinha(index) {
    const valor = document.getElementById(`foto-${index}`).value.trim();

    if (!valor) {
      mostrarMensagem("Preencha o caminho da foto.");
      return;
    }

    portfolioConfig.fotos[index] = valor;

    salvarStoragePortfolio();
    renderizarFotosPortfolioAdmin();
    mostrarMensagem("Foto salva com sucesso!");
  }

  function adicionarFotoPortfolio() {
    portfolioConfig.fotos.push("./fotos/foto01.png");
    salvarStoragePortfolio();
    renderizarFotosPortfolioAdmin();
    mostrarMensagem("Foto adicionada. Clique em Editar para alterar.");
  }

  function excluirFotoPortfolio(index) {
    if (!confirm("Tem certeza que deseja excluir esta foto?")) {
      return;
    }

    portfolioConfig.fotos.splice(index, 1);
    salvarStoragePortfolio();
    renderizarFotosPortfolioAdmin();
    mostrarMensagem("Foto excluída.");
  }

  function salvarPortfolio() {
    portfolioConfig.titulo = document.getElementById("portfolioTituloAdmin").value.trim();
    portfolioConfig.subtitulo = document.getElementById("portfolioSubtituloAdmin").value.trim();

    salvarStoragePortfolio();
    mostrarMensagem("Portfólio salvo com sucesso!");
  }

  function adicionarHorario() {
    const data = document.getElementById("adminData").value;
    const horario = document.getElementById("adminHorario").value;

    if (!data || !horario) {
      mostrarMensagem("Escolha uma data e um horário.");
      return;
    }

    if (editandoIndex !== null) {
      disponibilidades[editandoIndex] = {
        ...disponibilidades[editandoIndex],
        data,
        horario
      };

      editandoIndex = null;
      mostrarMensagem("Horário editado com sucesso!");
    } else {
      disponibilidades.push({
        data,
        horario,
        status: "disponivel"
      });

      mostrarMensagem("Horário adicionado com sucesso!");
    }

    document.getElementById("adminData").value = "";
    document.getElementById("adminHorario").value = "";

    salvarAutomatico();
    renderizarHorarios();
  }

  function editarHorario(index) {
    document.getElementById("adminData").value = disponibilidades[index].data;
    document.getElementById("adminHorario").value = disponibilidades[index].horario;

    editandoIndex = index;
    mostrarMensagem("Altere a data/horário e clique em Adicionar horário.");
  }

  function alternarStatus(index) {
    disponibilidades[index].status =
      disponibilidades[index].status === "ocupado" ? "disponivel" : "ocupado";

    salvarAutomatico();
    renderizarHorarios();
    mostrarMensagem("Status atualizado.");
  }

  function excluirHorario(index) {
    if (!confirm("Tem certeza que deseja excluir este horário?")) {
      return;
    }

    disponibilidades.splice(index, 1);
    salvarAutomatico();
    renderizarHorarios();
    mostrarMensagem("Horário excluído.");
  }

  function salvarAutomatico() {
    localStorage.setItem("disponibilidades", JSON.stringify(disponibilidades));
  }

  function formatarData(data) {
    const partes = data.split("-");
    return `${partes[2]}/${partes[1]}/${partes[0]}`;
  }

  function renderizarHorarios() {
    const lista = document.getElementById("listaHorarios");
    lista.innerHTML = "";

    if (disponibilidades.length === 0) {
      lista.innerHTML = "<p class='admin-vazio'>Nenhum horário cadastrado.</p>";
      return;
    }

    disponibilidades
      .sort((a, b) => `${a.data}${a.horario}`.localeCompare(`${b.data}${b.horario}`))
      .forEach((item, index) => {
        const card = document.createElement("div");
        card.className = `admin-horario-item ${item.status === "ocupado" ? "ocupado" : ""}`;

        const textoStatus = item.status === "ocupado" ? "Ocupado" : "Disponível";
        const botaoStatus = item.status === "ocupado" ? "Liberar" : "Ocupar";

        card.innerHTML = `
          <div>
            <strong>${formatarData(item.data)}</strong>
            <span>${item.horario}</span>
            <small>${textoStatus}</small>
          </div>

          <div class="admin-horario-acoes">
            <button onclick="editarHorario(${index})">Editar</button>
            <button onclick="alternarStatus(${index})">${botaoStatus}</button>
            <button class="danger" onclick="excluirHorario(${index})">Excluir</button>
          </div>
        `;

        lista.appendChild(card);
      });
  }

  renderizarPortfolioAdmin();
  renderizarHorarios();
</script>

</body>
</html>
