<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel ADM - Andressa Santos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="agenda">
  <div class="agenda-box">
    <h2>Painel ADM</h2>
    <p>Edite serviços, valores, fotos e horários.</p>

    <div id="mensagemAdmin" class="mensagem-admin"></div>

    <div class="agenda-etapa">
      <h3>Portfólio / Tabela de Serviços</h3>

      <input type="text" id="portfolioTituloAdmin" placeholder="Título">
      <input type="text" id="portfolioSubtituloAdmin" placeholder="Subtítulo">

      <h3>Aplicações</h3>
      <div id="listaAplicacoesAdmin"></div>
      <button class="btn-confirmar" onclick="adicionarServico('aplicacoes')">Adicionar aplicação</button>

      <h3>Manutenções</h3>
      <div id="listaManutencoesAdmin"></div>
      <button class="btn-confirmar" onclick="adicionarServico('manutencoes')">Adicionar manutenção</button>

      <h3>Fotos do portfólio</h3>
      <p class="aviso">Use nomes como: ./fotos/foto01.png</p>
      <div id="listaFotosPortfolioAdmin"></div>
      <button class="btn-confirmar" onclick="adicionarFotoPortfolio()">Adicionar foto</button>

      <button class="btn-confirmar" onclick="salvarPortfolio()">Salvar portfólio</button>
    </div>

    <div class="agenda-etapa">
      <h3>Adicionar disponibilidade</h3>

      <input type="date" id="adminData">
      <input type="time" id="adminHorario">

      <button class="btn-confirmar" onclick="adicionarHorario()">
        Adicionar horário
      </button>
    </div>

    <div class="agenda-etapa">
      <h3>Horários cadastrados</h3>
      <div id="listaHorarios" class="lista-admin"></div>
    </div>

    <button class="btn-confirmar" onclick="salvarHorarios()">
      Salvar alterações
    </button>
  </div>
</section>

<script>
  let disponibilidades = JSON.parse(localStorage.getItem("disponibilidades")) || [];
  let editandoIndex = null;

  const portfolioPadrao = {
    titulo: "Tabela de Serviços",
    subtitulo: "Beleza, cuidado e sofisticação em cada detalhe.",
    aplicacoes: [
      { nome: "Molde F1", preco: "R$ 120,00" },
      { nome: "Fibra de vidro", preco: "R$ 130,00" },
      { nome: "Banho de gel", preco: "R$ 90,00" },
      { nome: "Blindagem", preco: "R$ 80,00" },
      { nome: "Esmaltação em Gel", preco: "R$ 60,00" }
    ],
    manutencoes: [
      { nome: "Alongamento", preco: "R$ 90,00" },
      { nome: "Banho de gel", preco: "R$ 60,00" }
    ],
    fotos: [
      "./fotos/foto01.png",
      "./fotos/foto02.png",
      "./fotos/foto03.png",
      "./fotos/foto04.png",
      "./fotos/foto05.png",
      "./fotos/foto06.png"
    ]
  };

  let portfolioConfig = JSON.parse(localStorage.getItem("portfolioConfig")) || portfolioPadrao;

  disponibilidades = disponibilidades.map(item => ({
    ...item,
    status: item.status || "disponivel"
  }));

  function mostrarMensagem(texto) {
    const msg = document.getElementById("mensagemAdmin");
    msg.innerText = texto;
    msg.classList.add("ativo");

    setTimeout(() => {
      msg.classList.remove("ativo");
    }, 2500);
  }

  function renderizarPortfolioAdmin() {
    document.getElementById("portfolioTituloAdmin").value = portfolioConfig.titulo;
    document.getElementById("portfolioSubtituloAdmin").value = portfolioConfig.subtitulo;

    renderizarServicosAdmin("aplicacoes", "listaAplicacoesAdmin");
    renderizarServicosAdmin("manutencoes", "listaManutencoesAdmin");
    renderizarFotosPortfolioAdmin();
  }

  function renderizarServicosAdmin(tipo, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    portfolioConfig[tipo].forEach((item, index) => {
      const div = document.createElement("div");
      div.className = "linha-admin-servico";

      div.innerHTML = `
        <input type="text" value="${item.nome}" placeholder="Nome do serviço" onchange="editarServico('${tipo}', ${index}, 'nome', this.value)">
        <input type="text" value="${item.preco}" placeholder="Preço" onchange="editarServico('${tipo}', ${index}, 'preco', this.value)">
        <button onclick="excluirServico('${tipo}', ${index})">Excluir</button>
      `;

      container.appendChild(div);
    });
  }

  function editarServico(tipo, index, campo, valor) {
    portfolioConfig[tipo][index][campo] = valor;
  }

  function adicionarServico(tipo) {
    portfolioConfig[tipo].push({
      nome: "Novo serviço",
      preco: "R$ 0,00"
    });

    renderizarPortfolioAdmin();
  }

  function excluirServico(tipo, index) {
    portfolioConfig[tipo].splice(index, 1);
    renderizarPortfolioAdmin();
  }

  function renderizarFotosPortfolioAdmin() {
    const lista = document.getElementById("listaFotosPortfolioAdmin");
    lista.innerHTML = "";

    portfolioConfig.fotos.forEach((foto, index) => {
      const div = document.createElement("div");
      div.className = "linha-admin-servico";

      div.innerHTML = `
        <input type="text" value="${foto}" placeholder="./fotos/foto01.png" onchange="editarFotoPortfolio(${index}, this.value)">
        <button onclick="excluirFotoPortfolio(${index})">Excluir</button>
      `;

      lista.appendChild(div);
    });
  }

  function editarFotoPortfolio(index, valor) {
    portfolioConfig.fotos[index] = valor;
  }

  function adicionarFotoPortfolio() {
    portfolioConfig.fotos.push("./fotos/foto01.png");
    renderizarFotosPortfolioAdmin();
  }

  function excluirFotoPortfolio(index) {
    portfolioConfig.fotos.splice(index, 1);
    renderizarFotosPortfolioAdmin();
  }

  function salvarPortfolio() {
    portfolioConfig.titulo = document.getElementById("portfolioTituloAdmin").value;
    portfolioConfig.subtitulo = document.getElementById("portfolioSubtituloAdmin").value;

    localStorage.setItem("portfolioConfig", JSON.stringify(portfolioConfig));
    mostrarMensagem("Portfólio salvo com sucesso!");
  }

  function adicionarHorario() {
    const data = document.getElementById("adminData").value;
    const horario = document.getElementById("adminHorario").value;

    if (!data || !horario) {
      mostrarMensagem("Escolha uma data e um horário.");
      return;
    }

    if (editandoIndex !== null) {
      disponibilidades[editandoIndex] = {
        ...disponibilidades[editandoIndex],
        data,
        horario
      };

      editandoIndex = null;
      mostrarMensagem("Horário editado com sucesso!");
    } else {
      disponibilidades.push({
        data,
        horario,
        status: "disponivel"
      });

      mostrarMensagem("Horário adicionado com sucesso!");
    }

    document.getElementById("adminData").value = "";
    document.getElementById("adminHorario").value = "";

    salvarAutomatico();
    renderizarHorarios();
  }

  function editarHorario(index) {
    document.getElementById("adminData").value = disponibilidades[index].data;
    document.getElementById("adminHorario").value = disponibilidades[index].horario;

    editandoIndex = index;
    mostrarMensagem("Edite os campos e clique em Adicionar horário.");
  }

  function alternarStatus(index) {
    disponibilidades[index].status =
      disponibilidades[index].status === "ocupado" ? "disponivel" : "ocupado";

    salvarAutomatico();
    renderizarHorarios();
  }

  function excluirHorario(index) {
    if (!confirm("Tem certeza que deseja excluir este horário?")) return;

    disponibilidades.splice(index, 1);
    salvarAutomatico();
    renderizarHorarios();
    mostrarMensagem("Horário excluído.");
  }

  function salvarAutomatico() {
    localStorage.setItem("disponibilidades", JSON.stringify(disponibilidades));
  }

  function salvarHorarios() {
    salvarAutomatico();
    mostrarMensagem("Alterações salvas com sucesso!");
  }

  function formatarData(data) {
    const partes = data.split("-");
    return `${partes[2]}/${partes[1]}/${partes[0]}`;
  }

  function renderizarHorarios() {
    const lista = document.getElementById("listaHorarios");
    lista.innerHTML = "";

    if (disponibilidades.length === 0) {
      lista.innerHTML = "<p class='aviso'>Nenhum horário cadastrado.</p>";
      return;
    }

    disponibilidades.forEach((item, index) => {
      const card = document.createElement("div");
      card.className = `card-horario-admin ${item.status === "ocupado" ? "ocupado" : ""}`;

      const textoStatus = item.status === "ocupado" ? "Ocupado" : "Disponível";
      const botaoStatus = item.status === "ocupado" ? "Liberar" : "Ocupar";

      card.innerHTML = `
        <div>
          <strong>${formatarData(item.data)}</strong>
          <span>${item.horario}</span>
          <small>${textoStatus}</small>
        </div>

        <div class="acoes-admin">
          <button onclick="editarHorario(${index})">Editar</button>
          <button onclick="alternarStatus(${index})" class="${item.status === "ocupado" ? "liberar" : "ocupar"}">${botaoStatus}</button>
          <button onclick="excluirHorario(${index})" class="excluir">Excluir</button>
        </div>
      `;

      lista.appendChild(card);
    });
  }

  renderizarPortfolioAdmin();
  renderizarHorarios();
</script>

</body>
</html>
